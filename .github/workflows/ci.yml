name: CI

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-pub

      - name: Run tests (machine output)
        run: flutter test --machine --no-pub > test_output.json

      - name: Upload test output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.json

      - name: Build Flutter Web
        run: flutter build web --no-pub

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl

      - name: Run E2E Selenium Tests & Report Generator
        run: python run_tests.py

      - name: Upload E2E Test Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: E2E_Test_Report_VeriTask.xlsx
