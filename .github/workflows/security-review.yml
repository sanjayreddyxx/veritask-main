name: Backend Security Review

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install exceljs

      - name: Execute Backend Flask Security Audit
        env:
          NODE_PATH: ./node_modules
        run: |
          node VeritaskBackend/scripts/generateSecuritySuite.js

      - name: Enforce Zero-Critical Security Policy (Backend)
        run: |
          CRITICAL_COUNT=$(grep -i "Critical Findings" executive-summary.md | grep -o '[0-9]\+')
          echo "Detected Critical Findings Count: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Error: Zero-Critical Security Policy Violated! Fail GHA run."
            exit 1
          fi
          echo "Zero-Critical policy verified successfully."

      - name: Append Backend Security Audit reports to Step Summary
        run: |
          echo "### 🛡️ Backend SAST Security Review Findings" >> $GITHUB_STEP_SUMMARY
          cat executive-summary.md >> $GITHUB_STEP_SUMMARY
          echo -e "\n---\n" >> $GITHUB_STEP_SUMMARY
          cat dependency-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Security Findings Workbooks
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-findings
          path: |
            findings.xlsx
            security-review.md
            dependency-report.md
            executive-summary.md
