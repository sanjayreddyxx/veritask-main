name: API Load Testing

on:
  push:
    branches: [ main ]
    paths:
      - 'VeritaskBackend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'VeritaskBackend/**'
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Load Test
        env:
          BACKEND_URL: https://veritask-backend-demo.herokuapp.com
        run: |
          k6 run --summary-export=summary.json VeritaskBackend/scripts/load-test.js

      - name: Parse k6 Load Test Summary
        run: |
          node VeritaskBackend/scripts/parseK6Summary.js
