name: veritask
description: Secure task validation system with proof submission.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^17.0.0

  # Image & File Picking
  image_picker: ^1.0.7
  file_picker: ^11.0.2

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # UI
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
